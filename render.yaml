services:
  - type: web
    name: future-self-backend
    runtime: python
    rootDir: backend
    pythonVersion: "3.12.3"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: HF_API_KEY
        sync: false
      - key: HF_MODEL_ID
        value: Qwen/Qwen2.5-7B-Instruct
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false          # set to your frontend URL e.g. https://your-app.onrender.com
      - key: LLM_TIMEOUT_SEC
        value: "60"
      - key: UPSTREAM_TIMEOUT_SEC
        value: "10"
      - key: RENDER
        value: "true"
    healthCheckPath: /docs
